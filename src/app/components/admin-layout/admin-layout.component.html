<!-- Mobile Overlay -->
<div class="al-overlay" [class.al-overlay--visible]="mobileSidebarOpen" (click)="closeMobileSidebar()"></div>

<div class="al-wrap">

  <!-- ─── SIDEBAR ─── -->
  <aside class="al-sidebar"
    [class.al-sidebar--collapsed]="!sidebarOpen && !isMobile"
    [class.al-sidebar--open]="mobileSidebarOpen">

    <!-- Logo -->
    <div class="al-logo">
      <img src="logo.png" alt="B2P Teachers" class="al-logo__img" />
      <span class="al-logo__text">B2P Teachers</span>
    </div>

    <!-- Nav -->
    <nav class="al-nav">

      <!-- Satndalone -->
      <a class="al-nav__item"
        *ngFor="let item of standaloneMenus"
        [class.al-nav__item--active]="isActive(item.route)"
        (click)="navigate(item.route)">

        <span class="al-nav__icon">
          <i class="{{ item.icon }}"></i>
        </span>

        <span class="al-nav__label">
          {{ item.label }}
        </span>
      </a>

      <!-- Groups -->
      <ng-container *ngFor="let group of navGroups">
        <div class="al-group">
          <button class="al-group__header" (click)="toggleGroup(group.groupLabel)">
            <span class="al-group__label">{{ group.groupLabel }}</span>
            <i class="fa-solid fa-chevron-down al-group__arrow"
              [class.al-group__arrow--open]="isGroupExpanded(group.groupLabel)"></i>
          </button>

          <div class="al-group__items" [class.al-group__items--open]="isGroupExpanded(group.groupLabel)">
            <a class="al-nav__item al-nav__item--sub"
              *ngFor="let item of group.items"
              [class.al-nav__item--active]="isActive(item.route)"
              (click)="navigate(item.route)">
              <span class="al-nav__icon"><i class="{{ item.icon }}"></i></span>
              <span class="al-nav__label">{{ item.label }}</span>
              <span class="al-nav__badge" *ngIf="item.badge">{{ item.badge }}</span>
            </a>
          </div>
        </div>
      </ng-container>

    </nav>

    <!-- Footer -->
    <div class="al-sidebar__footer">

      <!-- Profile Completion (students only) -->
      <div class="al-profile-completion" *ngIf="isStudent && profileCompletion < 100" (click)="navigate('/profile')" title="Update Profile">
        <div class="al-pc__header">
          <i class="fa-solid fa-circle-user al-pc__icon"></i>
          <div class="al-pc__info">
            <span class="al-pc__label">Profile Completion</span>
            <span class="al-pc__pct">{{ profileCompletion }}%</span>
          </div>
          <i class="fa-solid fa-pen-to-square al-pc__edit"></i>
        </div>
        <div class="al-pc__bar-track">
          <div class="al-pc__bar-fill"
            [style.width.%]="profileCompletion"
            [class.al-pc__bar-fill--complete]="profileCompletion === 100">
          </div>
        </div>
        <span class="al-pc__status" *ngIf="profileCompletion < 100">
          Tap to complete your profile
        </span>
        <span class="al-pc__status al-pc__status--done" *ngIf="profileCompletion === 100">
          <i class="fa-solid fa-circle-check"></i> Profile complete
        </span>
      </div>

      <div class="al-user">
        <div class="al-user__avatar">{{ (userName | slice:0:1) || 'U' }}</div>
        <div class="al-user__info">
          <span class="al-user__name">{{ userName || 'User' }}</span>
          <span class="al-user__role">{{ roleName || 'Member' }}</span>
        </div>
        <button class="al-user__logout" (click)="logout()" title="Logout">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>

  </aside>

  <!-- ─── MAIN ─── -->
  <div class="al-main" [class.al-main--wide]="!sidebarOpen && !isMobile">

    <!-- Header -->
    <header class="al-header">
      <div class="al-header__left">
        <button class="al-header__toggle" (click)="toggleSidebar()" title="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="al-header__breadcrumb">
          <span class="al-header__page">{{ activeLabel }}</span>
        </div>
      </div>

      <div class="al-header__right">
        <div class="al-search">
          <i class="fa-solid fa-magnifying-glass al-search__icon"></i>
          <input class="al-search__input" type="text" placeholder="Search..." />
        </div>

        <button class="al-header__btn" (click)="refreshComponent()" title="Refresh">
          <i class="fa-solid fa-rotate-right"></i>
        </button>

        <button class="al-header__btn al-header__btn--notif" title="Logout" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>

        <div class="al-header__avatar" [title]="userName || 'User'">{{ (userName | slice:0:1) || 'U' }}</div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="al-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
